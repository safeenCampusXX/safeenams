<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CampusXX — Books</title>
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>
  <header class="navbar">
    <div class="nav-inner">
      <a class="brand" href="index.html">
        <div class="logo">CXX</div>
        <div class="brand-name">CampusXX</div>
      </a>

      <nav class="nav-links">
        <a href="books.html">Books</a>
        <a href="notes.html">Notes</a>
        <a href="devices.html">Devices</a>
        <a href="add.html" style="background: rgba(124,58,237,.12); border:1px solid rgba(124,58,237,.22)">Add Product</a>
      </nav>

      <button class="hamburger" id="hamburger" aria-label="Menu">
        <span style="display:block; width:22px; height:2px; background:#0b1220; margin:4px 0"></span>
        <span style="display:block; width:22px; height:2px; background:#0b1220; margin:4px 0"></span>
        <span style="display:block; width:22px; height:2px; background:#0b1220; margin:4px 0"></span>
      </button>

      <button id="themeToggle" class="btn btn-ghost" style="padding:10px 12px; border-radius:14px;">🌓</button>
    </div>

    <div class="mobile-menu" id="mobileMenu">
      <div class="links">
        <a href="books.html">Books</a>
        <a href="notes.html">Notes</a>
        <a href="devices.html">Devices</a>
        <a href="add.html">Add Product</a>
      </div>
    </div>
  </header>

  <main class="container">
    <section class="hero">
      <h1>Buy or sell college books</h1>
      <p>Search listings and connect with sellers in seconds.</p>
    </section>

    <section class="controls">
      <div class="search">
        <span aria-hidden="true">🔎</span>
        <input id="searchInput" type="text" placeholder="Search books (title, description)..." />
      </div>
      <select class="select" id="departmentFilter">
        <option value="">All departments</option>
        <option value="cs">Computer Science</option>
        <option value="math">Mathematics</option>
        <option value="physics">Physics</option>
        <option value="business">Business</option>
      </select>
      <select class="select" id="semesterFilter">
        <option value="">All semesters</option>
        <option value="1">Semester 1</option>
        <option value="2">Semester 2</option>
        <option value="3">Semester 3</option>
        <option value="4">Semester 4</option>
      </select>
    </section>

    <div id="status" class="controls" style="justify-content:center; margin-top:0"></div>

    <section class="grid" id="cards"></section>
  </main>

<script>
    window.API_BASE_URL = 'API_BASE_URL';
  </script>
  <script type="module" src="assets/js/books.js"></script>
</body>
</html>
